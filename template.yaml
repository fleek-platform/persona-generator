AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hono Streaming API with Lambda Function URL (Built-in esbuild)

Parameters:
  Environment:
    Type: String
    Description: The deployment environment (staging or production)
  PrivateOpenAIApiKey:
    Type: String
    Description: The private OpenAI API key
  PublicOpenAIApiUrl:
    Type: String
    Description: The public OpenAI API URL
  PublicOpenAIModel:
    Type: String
    Description: The public OpenAI model

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 32

Resources:
  PersonaGeneratorService:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: packages/persona-generator-service/
      PackageType: Zip
      Events: {}
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
      Environment:
        Variables:
          PRIVATE_OPENAI_COMPATIBLE_API_KEY: !Ref PrivateOpenAIApiKey
          PUBLIC_OPENAI_COMPATIBLE_API_URL: !Ref PublicOpenAIApiUrl
          PUBLIC_OPENAI_COMPATIBLE_MODEL: !Ref PublicOpenAIModel
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - src/index.ts

Outputs:
  PersonaGeneratorServiceUrl:
    Description: "URL for the PersonaGeneratorService Lambda"
    Value: !GetAtt PersonaGeneratorServiceUrl.FunctionUrl
