# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default.global.parameters]
stack_name = "persona-generator-test-staging"
resolve_s3 = true
s3_prefix = "persona-generator-test-staging"
region = "eu-west-2"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
image_repositories = []

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

[staging.deploy.parameters]
stack_name = "persona-generator-staging"
s3_bucket = "persona-generator-staging-bucket"
s3_prefix = "persona-generator/staging"
region = "eu-west-2"
capabilities = "CAPABILITY_IAM"

[production.deploy.parameters]
stack_name = "persona-generator-production"
s3_bucket = "persona-generator-production-bucket"
s3_prefix = "persona-generator/production"
region = "eu-west-2"
capabilities = "CAPABILITY_IAM"
